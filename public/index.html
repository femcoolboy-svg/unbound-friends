<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNBOUND | Чат и звонки</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <!-- АВТОРИЗАЦИЯ -->
        <div id="authScreen" class="auth-card">
            <h1>✨ UNBOUND</h1>
            <div class="tabs">
                <button class="tab active" data-tab="login">Вход</button>
                <button class="tab" data-tab="register">Регистрация</button>
            </div>
            <div id="loginTab">
                <input type="text" id="loginId" placeholder="ID">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginBtn">Войти</button>
            </div>
            <div id="registerTab" class="hidden">
                <input type="text" id="regId" placeholder="ID (3+ символов)">
                <input type="text" id="regName" placeholder="Имя">
                <input type="password" id="regPassword" placeholder="Пароль (4+ символов)">
                <div class="captcha-row">
                    <span id="captchaNum">0</span>
                    <input type="text" id="regCaptcha" placeholder="Введите число">
                    <button id="refreshCaptcha">🔄</button>
                </div>
                <button id="registerBtn">Зарегистрироваться</button>
            </div>
            <div id="authError" class="error hidden"></div>
        </div>

        <!-- ОСНОВНОЙ ЭКРАН -->
        <div id="mainScreen" class="main hidden">
            <div class="sidebar">
                <div class="profile">
                    <img id="avatarImg" class="avatar" src="" alt="avatar">
                    <button id="uploadAvatarBtn" class="upload-btn">📷</button>
                    <input type="file" id="avatarFile" accept="image/*" style="display:none">
                    <div class="profile-name">
                        <span id="userName"></span>
                        <span id="adminBadge" class="admin-badge hidden">АДМИН</span>
                    </div>
                    <button id="settingsBtn" class="icon">⚙️</button>
                    <button id="logoutBtn" class="icon">🚪</button>
                </div>
                <div class="search">
                    <h3>🔍 Найти друзей</h3>
                    <div class="search-row">
                        <input type="text" id="searchInput" placeholder="Имя или ID">
                        <button id="searchBtn">Найти</button>
                    </div>
                    <div id="searchResults" class="search-results hidden"></div>
                </div>
                <div class="friends">
                    <h3>👥 Друзья <span id="friendsCount">0</span></h3>
                    <div id="friendsList"></div>
                </div>
                <div id="adminPanel" class="admin-panel hidden">
                    <h3>🔨 Бан-лист</h3>
                    <div id="banList"></div>
                </div>
            </div>
            <div class="chat">
                <div class="chat-header">
                    <span>💬 Общий чат</span>
                    <button id="soundToggle">🔊</button>
                </div>
                <div id="messages" class="messages"></div>
                <div class="input-area">
                    <div id="typingIndicator" class="typing hidden"></div>
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button id="sendBtn">Отправить</button>
                </div>
            </div>
            <div class="calls">
                <h3>📞 Звонки</h3>
                <div id="activeCall" class="call-card hidden">
                    <div id="callStatus"></div>
                    <button id="hangupBtn" class="danger">Завершить</button>
                </div>
                <div id="incomingCall" class="call-card incoming hidden">
                    <p>Входящий звонок от <strong id="callerName"></strong></p>
                    <div class="call-buttons">
                        <button id="acceptCall" class="success">Принять</button>
                        <button id="rejectCall" class="danger">Отклонить</button>
                    </div>
                </div>
                <div class="info">🎤 Нажми 📞 у друга, разреши микрофон</div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <h2>Настройки</h2>
            <input type="text" id="settingsName" placeholder="Новое имя">
            <input type="password" id="settingsPassword" placeholder="Новый пароль">
            <div class="modal-buttons">
                <button id="saveSettings">Сохранить</button>
                <button id="closeSettings">Отмена</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>
</html>
