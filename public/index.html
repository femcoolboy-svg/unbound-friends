<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNBOUND</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h1>✨ UNBOUND</h1>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            
            <div id="loginTab">
                <input type="text" id="loginId" placeholder="ID">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginBtn">Войти</button>
            </div>
            
            <div id="registerTab" class="hidden">
                <input type="text" id="regId" placeholder="ID (от 3 символов)">
                <input type="text" id="regName" placeholder="Имя">
                <input type="password" id="regPassword" placeholder="Пароль (от 4 символов)">
                <div class="captcha-row">
                    <span id="captchaQuestion"></span>
                    <input type="text" id="regCaptcha" placeholder="Ответ" size="5">
                    <button id="refreshCaptchaBtn">🔄</button>
                </div>
                <button id="registerBtn">Зарегистрироваться</button>
            </div>
            
            <div id="authError" class="error hidden"></div>
        </div>
    </div>

    <div id="mainScreen" class="main-screen hidden">
        <div class="sidebar">
            <div class="user-info">
                <span id="userName"></span>
                <button id="logoutBtn">Выйти</button>
                <button id="settingsBtn">⚙️</button>
            </div>
            <div class="online-list">
                <h3>Онлайн (<span id="onlineCount">0</span>)</h3>
                <div id="usersList"></div>
            </div>
            <!-- Админ-панель -->
            <div id="adminPanel" class="admin-panel hidden">
                <h3>🔨 Бан-лист</h3>
                <div id="banList"></div>
            </div>
        </div>
        
        <div class="chat">
            <div class="chat-header">
                <span>💬 Чат</span>
                <button id="soundToggle">🔊</button>
            </div>
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button id="sendBtn">📤</button>
            </div>
            <div id="typingIndicator" class="typing hidden"></div>
        </div>
        
        <div class="calls">
            <h3>📞 Звонки</h3>
            <div id="activeCall" class="call-card hidden">
                <div id="callStatus"></div>
                <button id="hangupBtn">Завершить</button>
            </div>
            <div id="incomingCall" class="call-card hidden">
                <p>Звонок от <span id="callerName"></span></p>
                <button id="acceptCall">Принять</button>
                <button id="rejectCall">Отклонить</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <h2>Настройки</h2>
            <input type="text" id="settingsName" placeholder="Новое имя">
            <input type="text" id="settingsAvatar" placeholder="Аватар (эмодзи)" maxlength="2">
            <input type="password" id="settingsPassword" placeholder="Новый пароль">
            <button id="saveSettings">Сохранить</button>
            <button id="closeSettings">Закрыть</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>
</html>
